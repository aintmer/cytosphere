# XcodeGen spec — optional. Generates TrajectoryWallpaper.xcodeproj from this
# file so the project layout is reproducible and diff-friendly.
#
#   brew install xcodegen   (one-time)
#   cd ~/Developer/TrajectoryWallpaper && xcodegen generate
#
# If you'd rather not install XcodeGen, see README.md for the manual Xcode route.

name: TrajectoryWallpaper

options:
  bundleIdPrefix: com.aintmer
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    # Kept in sync with the checked-in TrajectoryWallpaper.xcodeproj so that
    # `xcodegen generate` reproduces the shipping release identity rather than
    # regressing it. Bump these here AND in the project when cutting a release.
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: F6GPTM54F7
    PRODUCT_BUNDLE_IDENTIFIER: com.aintmer.TrajectoryWallpaper
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  TrajectoryWallpaper:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.graphics-design
        # Photos write access (used by the export pipeline, added later):
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Saves the wallpaper you export to your photo library."
        # App icon — rendered by Scripts/render_app_icon.swift into
        # Sources/Resources/Assets.xcassets/AppIcon.appiconset/. This setting
        # tells actool which asset is the launcher icon (otherwise the catalog
        # compiles silently to nothing).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # User-facing display name (Dock / Home Screen / Finder). The
        # internal project + bundle ID stay as TrajectoryWallpaper so we
        # don't break dev paths or App Store identity.
        INFOPLIST_KEY_CFBundleDisplayName: Cytosphere
        # Mac App Store requires App Sandbox. macOS-only so the iOS build is
        # unaffected (it must NOT carry the app-sandbox entitlement).
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": macOS.entitlements
